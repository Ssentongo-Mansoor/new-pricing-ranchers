<script>
// Inline price editing
function fmtAttr(cell){ return cell.getAttribute('data-raw'); }
document.querySelectorAll('.price-cell.editable').forEach(function(cell){
  cell.addEventListener('click', function(){
    if (cell.querySelector('input')) return;
    var raw = cell.getAttribute('data-raw') || '';
    var current = cell.innerHTML;
    cell.dataset.prev = current;
    cell.innerHTML = '<input type="number" step="0.0001" class="form-control form-control-sm text-end" value="'+raw+'">';
    var input = cell.querySelector('input');
    input.focus(); input.select();
    function save(){
      var val = input.value;
      var fd = new FormData();
      fd.append('tier', cell.getAttribute('data-tier'));
      fd.append('value', val);
      fetch('{{ url_for("pricelists.edit_price", line_id=0) }}'.replace('/0/','/'+cell.getAttribute('data-line')+'/'), {
        method:'POST', body: fd, headers:{'X-Requested-With':'fetch'}
      }).then(r=>r.json()).then(function(d){
        if(d.ok && d.pending){
          // Staged for approval: live price unchanged. Keep the old value shown
          // and flag the proposed price as pending, not applied.
          cell.innerHTML = (cell.dataset.prev || '') +
            ' <span class="badge bg-warning text-dark" title="Awaiting approval — not live yet">pending: '+(d.formatted||'')+'</span>';
          showToast(d.message || 'Submitted for approval — not live until approved.', true);
        } else if(d.ok){
          cell.setAttribute('data-raw', d.raw===null?'':d.raw);
          cell.innerHTML = d.formatted || '<span class="text-muted">—</span>';
          showToast('Saved. Logged to history.');
        } else { cell.innerHTML = cell.dataset.prev; alert(d.error||'Could not save'); }
      }).catch(function(){ cell.innerHTML = cell.dataset.prev; alert('Network error'); });
    }
    input.addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); save(); }
      if(e.key==='Escape'){ cell.innerHTML = cell.dataset.prev; }
    });
    input.addEventListener('blur', save);
  });
});

function showToast(msg, warn){
  var c = document.querySelector('.toast-container');
  var el = document.createElement('div');
  el.className = 'toast align-items-center border-0 show ' + (warn ? 'text-bg-warning' : 'text-bg-success');
  var flex=document.createElement('div'); flex.className='d-flex';
  var body=document.createElement('div'); body.className='toast-body'; body.textContent=msg;
  var close=document.createElement('button'); close.type='button';
  close.className='btn-close btn-close-white me-2 m-auto'; close.setAttribute('data-bs-dismiss','toast');
  flex.appendChild(body); flex.appendChild(close); el.appendChild(flex);
  c.appendChild(el);
  setTimeout(function(){ try{ bootstrap.Toast.getOrCreateInstance(el).hide(); }catch(e){} }, 3500);
}

function prepOverride(btn){
  var lineId = btn.getAttribute('data-line');
  document.getElementById('ovArt').textContent = btn.getAttribute('data-art');
  document.getElementById('ovForm').setAttribute('action',
    '{{ url_for("pricelists.set_override", line_id=0) }}'.replace('/0/','/'+lineId+'/'));
}
</script>
