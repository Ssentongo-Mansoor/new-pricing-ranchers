{% extends "base.html" %}
{% block heading %}{{ 'Edit promotion' if a else 'New promotion' }}{% endblock %}
{% block content %}
<div class="rf-card p-4" style="max-width:680px">
  <form method="post" enctype="multipart/form-data">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3"><label class="form-label">Title</label>
      <input class="form-control" name="title" value="{{ a.title if a else form.get('title','') }}" required></div>
    <div class="mb-3"><label class="form-label">Message</label>
      <textarea class="form-control" name="body" rows="4" placeholder="e.g. Father's Day offer — discounted whole chicken…">{{ a.body if a else form.get('body','') }}</textarea></div>
    <div class="mb-3"><label class="form-label">Image / flyer (optional)</label>
      <input class="form-control" type="file" name="image" accept=".png,.jpg,.jpeg,.webp,.gif">
      {% if a and a.image_filename %}<div class="form-text">Current image kept unless you upload a new one. <a href="{{ url_for('promotions.image', promo_id=a.id) }}" target="_blank">view</a></div>{% endif %}</div>
    <div class="row">
      <div class="col-md-4 mb-3"><label class="form-label">Audience</label>
        <select class="form-select" name="audience">
          <option value="all" {{ 'selected' if (a and a.audience=='all') or not a }}>Everyone</option>
          <option value="customers" {{ 'selected' if a and a.audience=='customers' }}>Customers only</option>
          <option value="distributors" {{ 'selected' if a and a.audience=='distributors' }}>Distributors only</option>
        </select></div>
      <div class="col-md-4 mb-3"><label class="form-label">Show from</label>
        <input class="form-control" type="date" name="valid_from" value="{{ a.valid_from if a and a.valid_from else '' }}"></div>
      <div class="col-md-4 mb-3"><label class="form-label">Show until</label>
        <input class="form-control" type="date" name="valid_until" value="{{ a.valid_until if a and a.valid_until else '' }}"></div>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" name="is_active" id="act" {{ 'checked' if (a and a.is_active) or not a }}>
      <label class="form-check-label" for="act">Active (visible on the portal)</label></div>
    <button class="btn btn-primary">{{ 'Save' if a else 'Post promotion' }}</button>
    <a class="btn btn-link" href="{{ url_for('promotions.index') }}">Cancel</a>
  </form>
</div>
{% endblock %}
