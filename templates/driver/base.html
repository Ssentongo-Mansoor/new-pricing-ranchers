<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <script>
  (function(){
    var meta=document.querySelector('meta[name=csrf-token]');
    var _csrf=meta?meta.content:'';
    var _origFetch=window.fetch;
    window.fetch=function(u,o){
      o=o||{};
      var m=((o.method||'GET')+'').toUpperCase();
      if(m!=='GET'&&m!=='HEAD'&&m!=='OPTIONS'&&m!=='TRACE'){
        o.headers=Object.assign({},o.headers,{'X-CSRFToken':_csrf});
      }
      return _origFetch.call(this,u,o);
    };
  })();
  </script>
  <title>{{ app_name }} · Deliveries</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/brand.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/ranchers-logo.png') }}">
</head>
<body style="background:#f4ece1">
<nav class="rf-topbar" style="border-bottom:3px solid transparent; border-image:var(--rf-gradient) 1;">
  <a href="{{ url_for('driver.home') }}" class="d-flex align-items-center gap-2 text-decoration-none">
    <img src="{{ url_for('static', filename='img/ranchers-logo.svg') }}" style="height:40px" alt="">
    <span class="fw-semibold rf-head">Deliveries</span>
    {% if driver_new %}<span class="badge badge-danger">{{ driver_new }}</span>{% endif %}
  </a>
  <div class="d-flex align-items-center gap-2">
    <span class="small text-muted d-none d-sm-inline">{{ current_user.full_name }}</span>
    <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</nav>
<div class="container py-3" style="max-width:760px">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, m in messages %}<div class="alert alert-{{ 'danger' if cat=='danger' else 'warning' if cat=='warning' else 'success' }} py-2">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
