{% macro daterange(endpoint, extra={}) %}
<form class="row g-2 align-items-end mb-3" method="get" action="{{ url_for(endpoint) }}">
  {% for k,v in extra.items() %}<input type="hidden" name="{{ k }}" value="{{ v }}">{% endfor %}
  <div class="col-auto"><label class="form-label small mb-0">From</label>
    <input class="form-control form-control-sm" type="date" name="from" value="{{ frm }}"></div>
  <div class="col-auto"><label class="form-label small mb-0">To</label>
    <input class="form-control form-control-sm" type="date" name="to" value="{{ to }}"></div>
  <div class="col-auto"><button class="btn btn-sm btn-primary">Run</button></div>
  <div class="col-auto"><a class="btn btn-sm btn-outline-secondary" href="{{ url_for(endpoint, **extra) }}">Today</a></div>
</form>
{% endmacro %}
