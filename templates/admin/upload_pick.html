{% extends "base.html" %}
{% block heading %}Admin{% endblock %}
{% block content %}
{% include "admin/_nav.html" %}
<div class="rf-card p-4" style="max-width:640px">
  <h2 class="h6 mb-3">Choose a sheet · {{ filename }}</h2>
  <form method="post" action="{{ url_for('admin.upload_preview') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3"><label class="form-label">Sheet</label>
      <select class="form-select" name="sheet">{% for s in sheets %}<option>{{ s }}</option>{% endfor %}</select></div>
    <button class="btn btn-primary">Preview &amp; map columns</button>
  </form>
</div>
{% endblock %}
