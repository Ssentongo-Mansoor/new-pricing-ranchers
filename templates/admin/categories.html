{% extends "base.html" %}
{% block heading %}Admin{% endblock %}
{% block content %}
{% include "admin/_nav.html" %}
<div class="row g-3">
  <div class="col-lg-7"><div class="rf-card p-3">
    <h2 class="h6">Categories</h2>
    <table class="table table-sm align-middle mb-0">
      <thead><tr><th>Name</th><th>Parent</th><th>Products</th><th></th></tr></thead>
      <tbody>
      {% for c in cats %}
        <tr><td>{{ c.name }}</td><td class="small text-muted">{{ c.parent.name if c.parent else '—' }}</td>
          <td>{{ c.products|length }}</td>
          <td class="text-end"><form method="post" action="{{ url_for('admin.category_delete', cat_id=c.id) }}" onsubmit="return confirm('Delete category?')">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-danger py-0 px-1"><i class="bi bi-trash"></i></button></form></td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div></div>
  <div class="col-lg-5"><div class="rf-card p-3">
    <h2 class="h6">Add category</h2>
    <form method="post">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-2"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
      <div class="mb-2"><label class="form-label">Parent (optional)</label>
        <select class="form-select" name="parent_id"><option value="">— top level —</option>
          {% for c in cats if not c.parent %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select></div>
      <button class="btn btn-primary btn-sm">Add</button>
    </form>
  </div></div>
</div>
{% endblock %}
