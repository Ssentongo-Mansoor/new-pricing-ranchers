<form class="d-flex gap-2 mb-3 align-items-end" method="get">
  <div><label class="form-label small">From</label>
    <input class="form-control form-control-sm" type="date" name="from" value="{{ dfrom.isoformat() }}"></div>
  <div><label class="form-label small">To</label>
    <input class="form-control form-control-sm" type="date" name="to" value="{{ dto.isoformat() }}"></div>
  <button class="btn btn-sm btn-primary">Run</button>
</form>
